name: fast_as_lightning
description: A GPS sport tracker - Vibe coded in Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  
  # GPS & Location
  geolocator: ^9.0.2
  google_maps_flutter: ^2.5.0
  
  # Database
  sqflite: ^2.2.8+4
  path: ^1.8.3
  
  # Utilities
  intl: ^0.18.1
  permission_handler: ^11.4.4
  
  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
